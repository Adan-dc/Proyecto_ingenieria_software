<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Junta Vecinal — Configuración</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app-container" class="active">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo">
          <div class="brand-avatar">JV</div>
          <div>
            <div class="brand-name">Junta Vecinal</div>
            <div class="brand-role">Portal Administrativo</div>
          </div>
        </div>
      </div>
      <nav class="nav-section">
        <a href="dashboard.html" class="nav-item ">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 11l8-9 8 9v7a1 1 0 01-1 1H3a1 1 0 01-1-1v-7z" /></svg>
          Dashboard
        </a>
        <a href="subadmins.html" class="nav-item ">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zm5 8a5 5 0 00-10 0h10z" /></svg>
          Sub-Admins
        </a>
        <a href="vecinos.html" class="nav-item ">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path d="M9 12l-4.5 4.5L3 15l4.5-4.5L3 6h6l2 4-2 2zm2 0l4.5 4.5L17 15l-4.5-4.5L17 6h-6l-2 4 2 2z" opacity="0" />
            <path d="M7 8a2 2 0 100-4 2 2 0 000 4zm5 0a2 2 0 100-4 2 2 0 000 4zM3 18a7 7 0 0114 0H3z" />
          </svg>
          Registro de Vecinos
        </a>
        <a href="historial.html" class="nav-item ">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path d="M4 3a1 1 0 000 2h12a1 1 0 100-2H4zM3 8a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm1 4a1 1 0 100 2h8a1 1 0 100-2H4z" />
          </svg>
          Historial
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="config.html" class="nav-item active">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
          </svg>
          Configuración
        </a>
        <div class="nav-item danger" onclick="logout()">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd" />
          </svg>
          Cerrar Sesión
        </div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <span class="topbar-title">Configuración</span>
        <div class="topbar-actions">
          <a href="reportes.html" class="icon-btn" title="Notificaciones">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zm0 16a2 2 0 001.414-.586A2 2 0 0012 17H8a2 2 0 002 1z" />
            </svg>
            <span class="notif-dot"></span>
          </a>
          <div class="icon-btn" title="Ayuda">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" />
            </svg>
          </div>
          <div class="user-chip" title="Administrador">A</div>
        </div>
      </header>

            <div class="page active" id="page-config">
        <div class="page-header">
          <div class="page-header-text">
            <h1>Configuración</h1>
          </div>
        </div>
        <div class="card card-pad" style="max-width:540px;">
          <div class="section-title">Información de la Junta</div>
          <div style="display:flex;flex-direction:column;gap:14px;">
            <div class="form-group"><label>Nombre</label><input type="text" value="Junta Vecinal"></div>
            <button class="btn btn-primary" onclick="showToast('Guardado','✅')" style="width:fit-content;">Guardar</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span id="toast-msg">Acción completada</span>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3>Nuevo Usuario</h3>
        <button class="modal-close" onclick="closeModal('modal-overlay')">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <button class="chip active" onclick="setModalTab(this,'vecino')">Vecino</button>
          <button class="chip" onclick="setModalTab(this,'subadmin')">Sub-Admin</button>
        </div>
        <div class="form-group">
          <label>Nombre Completo</label>
          <input type="text" id="m-nombre" placeholder="Ej. Juan Pérez">
        </div>
        <div class="form-group">
          <label>RUT</label>
          <input type="text" id="m-rut" placeholder="Ej. 12.345.678-9">
        </div>
        <div class="form-group">
          <label>Correo</label>
          <input type="email" id="m-email" placeholder="ejemplo@correo.com">
        </div>
        <div class="form-group" id="m-casa-group">
          <label>Casa/Dirección</label>
          <input type="text" id="m-casa" placeholder="Ej. Casa 14">
        </div>
        <div class="form-group" id="m-roles-group" style="display:none;">
          <label>Roles</label>
          <label><input type="checkbox" name="m-roles" value="Sub-Admin"> Sub-Admin</label>
          <label><input type="checkbox" name="m-roles" value="Administrador"> Administrador</label>
        </div>
        <button class="btn btn-primary" id="btn-modal-crear" onclick="crearDesdeModal()" style="width:100%;justify-content:center;margin-top:8px;">crear vecino</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="profile-modal-overlay">
    <div class="modal" style="max-width:320px;">
      <div class="modal-header">
        <h3>Perfil del Usuario</h3>
        <button class="modal-close" onclick="closeModal('profile-modal-overlay')">✕</button>
      </div>
      <div class="modal-body" style="text-align:center;">
        <div class="avatar" style="margin: 0 auto 12px auto; width:56px; height:56px; font-size:22px; background:var(--accent);">P</div>
        <h3 id="p-nombre" style="margin-bottom:4px;">Nombre</h3>
        <div id="p-email" style="color:var(--text-secondary);font-size:13px;margin-bottom:16px;">email</div>
        <div style="text-align:left; background:var(--bg-card); padding:12px; border-radius:8px;">
          <div style="margin-bottom:8px;"><strong style="font-size:12px;color:var(--text-muted);">RUT</strong><br><span id="p-rut"></span></div>
          <div><strong style="font-size:12px;color:var(--text-muted);">Dirección</strong><br><span id="p-casa"></span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="acciones-modal-overlay">
    <div class="modal" style="max-width:320px;">
      <div class="modal-header">
        <h3>Acciones de Usuario</h3>
        <button class="modal-close" onclick="closeModal('acciones-modal-overlay')">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
          <div class="avatar" id="ac-avatar"></div>
          <div>
            <div style="font-weight:600;" id="ac-nombre"></div>
            <div style="font-size:12px;color:var(--text-muted);" id="ac-rol"></div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button class="btn btn-secondary" onclick="accActivar()" style="justify-content:center;color:#10b981;">Activar Cuenta</button>
          <button class="btn btn-secondary" onclick="accBloquear()" style="justify-content:center;color:#f59e0b;">Bloquear Acceso</button>
          <button class="btn btn-danger" onclick="accEliminar()" style="justify-content:center;margin-top:8px;">Eliminar Permanentemente</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="config.js"></script>
</body>
</html>
