<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Junta Vecinal — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- LOGIN -->
  <div id="login-container">
    <div class="login-card">
      <div style="text-align:center; margin-bottom: 20px;">
        <div class="brand-avatar" style="margin: 0 auto; width: 48px; height: 48px; font-size: 18px;">JV</div>
      </div>
      <div class="login-title">Iniciar Sesión</div>
      <div class="login-sub">Acceso exclusivo para administradores</div>
      <form id="login-form">
        <div class="form-group" style="margin-bottom: 16px;">
          <label>Correo Electrónico</label>
          <input type="email" id="login-email" placeholder="admin@juntavecinal.com" required>
        </div>
        <div class="form-group" style="margin-bottom: 24px;">
          <label>Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary"
          style="width: 100%; justify-content: center; padding: 12px; font-size: 14px;">Ingresar al Panel</button>
      </form>
      <div style="margin-top:20px; font-size: 12px; color: var(--text-muted); text-align:center;">
        Para probar, usa <strong>admin@juntavecinal.com</strong> / <strong>admin</strong>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span id="toast-msg">Acción completada</span>
  </div>

  <script src="app.js"></script>
  <script src="login.js"></script>
</body>
</html>
