<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso | Junta Vecinal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <div class="login-logo"><i class="fa-solid fa-house-user"></i></div>
      <h1>Junta Vecinal</h1>
      <p>Ingresa con una cuenta administradora o sub-admin.</p>
      <form id="login-form">
        <div class="form-group"><label>Correo</label><input id="login-email" type="email" placeholder="admin@juntavecinal.com" required></div>
        <div class="form-group"><label>Contraseña</label><input id="login-password" type="password" placeholder="admin" required></div>
        <button class="btn btn-primary" type="submit" style="width:100%;margin-top:8px;">Ingresar</button>
      </form>
    </section>
  </main>
  <div class="toast" id="toast"><span class="toast-icon">✓</span><span id="toast-msg">Acción realizada</span></div>
  <script src="./app.js"></script>
  <script src="./login.js"></script>
</body>
</html>
