<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sub-Admins | Junta Vecinal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div>
        <div class="logo"><div class="logo-icon"><i class="fa-solid fa-house-user"></i></div><div><h2>Junta Vecinal</h2><p>Administración</p></div></div>
        <nav class="nav"><a href="./dashboard.html" class=""><i class="fa-solid fa-chart-line"></i>Panel</a>
<a href="./vecinos.html" class=""><i class="fa-solid fa-users"></i>Vecinos</a>
<a href="./subadmins.html" class="active"><i class="fa-solid fa-user-shield"></i>Sub-Admins</a>
<a href="./historial.html" class=""><i class="fa-solid fa-clock-rotate-left"></i>Historial</a>
<a href="./config.html" class=""><i class="fa-solid fa-gear"></i>Configuración</a></nav>
      </div>
      <button class="logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</button>
    </aside>
    <main class="main">
      
<header class="header"><div><h1>Sub-Admins</h1><p>Crea cuentas administrativas para acceder a los módulos de gestión.</p></div><button class="btn btn-secondary" onclick="cargarSubAdmins()"><i class="fa-solid fa-rotate-right"></i> Actualizar</button></header>
<section class="card"><div class="card-header"><h2>Crear Sub-Admin</h2></div><div class="card-body"><div class="form-grid"><div class="form-group"><label>Nombre</label><input id="sa-nombre" placeholder="Ej: Ana Salazar"></div><div class="form-group"><label>RUT</label><input id="sa-rut" placeholder="Ej: 12.345.678-9"></div><div class="form-group"><label>Correo</label><input id="sa-email" type="email" placeholder="correo@ejemplo.com"></div><div class="form-group"><label>Contraseña</label><input id="sa-password" type="password" placeholder="Ej: 123456"></div><div class="form-group"><label>Rol</label><select id="sa-rol"><option value="SUB_ADMIN">SUB_ADMIN</option><option value="GESTION_TALLERES">GESTION_TALLERES</option><option value="GESTION_DONACIONES">GESTION_DONACIONES</option><option value="ADMIN">ADMIN</option></select></div></div><button class="btn btn-primary" onclick="crearSubAdmin()"><i class="fa-solid fa-plus"></i> Crear Sub-Admin</button></div></section>
<section class="card"><div class="card-header"><h2>Cuentas Sub-Admin</h2></div><div class="table-wrap"><table><thead><tr><th>Usuario</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="sa-table"><tr><td colspan="4" class="empty">Cargando sub-admins...</td></tr></tbody></table></div></section>

    </main>
  </div>
  <div class="toast" id="toast"><span class="toast-icon">✓</span><span id="toast-msg">Acción realizada</span></div>
  <script src="./app.js"></script>
<script src="./subadmins.js"></script>
  <script>document.addEventListener('DOMContentLoaded', validarSesion);</script>
</body>
</html>
