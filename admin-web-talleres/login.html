<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Acceso | Gestión de Talleres</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #ecfdf5, #f8fafc);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111827;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 24px;
      padding: 36px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.14);
      border: 1px solid #e5e7eb;
    }

    .logo {
      width: 74px;
      height: 74px;
      border-radius: 22px;
      background: #16a34a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin: 0 auto 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      font-weight: 900;
      text-align: center;
      color: #111827;
    }

    p {
      margin: 0 0 28px;
      text-align: center;
      color: #64748b;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #334155;
      font-size: 14px;
      font-weight: 800;
    }

    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 13px;
      padding: 14px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.12);
    }

    .btn-login {
      width: 100%;
      border: none;
      border-radius: 13px;
      background: #16a34a;
      color: white;
      padding: 15px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 6px;
    }

    .btn-login:hover {
      background: #15803d;
    }

    .error {
      display: none;
      margin-top: 18px;
      background: #fee2e2;
      color: #b91c1c;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      text-align: center;
    }
  </style>
</head>

<body>

  <main class="login-card">

    <div class="logo">
      <i class="fa-solid fa-chalkboard-user"></i>
    </div>

    <h1>Gestión de Talleres</h1>

    <p>
      Ingresa con una cuenta Sub-Admin creada desde Junta Vecinal.
    </p>

    <form id="login-form">

      <div class="form-group">
        <label>Correo</label>
        <input id="correo" type="email" placeholder="correo@ejemplo.com" required>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input id="password" type="password" placeholder="Contraseña" required>
      </div>

      <button class="btn-login" type="submit">
        Ingresar
      </button>

      <div id="login-error" class="error">
        Correo, contraseña o permisos incorrectos.
      </div>

    </form>

  </main>

  <script src="js/login.js"></script>

</body>
</html>
