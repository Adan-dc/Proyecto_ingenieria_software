<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes | Gestión de Donaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-gray-800">

    <!-- Sidebar (Same as index.html for simplicity in Vanilla JS) -->
    <aside class="w-64 bg-white shadow-xl flex-shrink-0 z-20 hidden md:flex flex-col">
        <div class="h-16 flex items-center justify-center border-b border-gray-100">
            <h1 class="text-xl font-bold text-indigo-600"><i class="fa-solid fa-hand-holding-heart mr-2"></i>Donaciones</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-2 px-4">
                <li>
                    <a href="principal.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-indigo-600 rounded-lg font-medium transition-colors">
                        <i class="fa-solid fa-house"></i> Principal
                    </a>
                </li>
                <li>
                    <a href="solicitudes.html" class="flex items-center gap-3 px-4 py-3 bg-indigo-50 text-indigo-700 rounded-lg font-medium transition-colors">
                        <i class="fa-solid fa-inbox"></i> Solicitudes
                    </a>
                </li>
                <li>
                    <a href="inventario.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-indigo-600 rounded-lg font-medium transition-colors">
                        <i class="fa-solid fa-boxes-stacked"></i> Inventario
                    </a>
                </li>
                <li>
                    <a href="historial-eliminadas.html" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-indigo-600 rounded-lg font-medium transition-colors">
                        <i class="fa-solid fa-clock-rotate-left"></i> Historial
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10">
            <h2 class="text-xl font-semibold text-gray-800">Solicitudes Pendientes</h2>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="py-3 px-6 text-sm font-semibold text-gray-600">ID</th>
                            <th class="py-3 px-6 text-sm font-semibold text-gray-600">Donante (RUT)</th>
                            <th class="py-3 px-6 text-sm font-semibold text-gray-600">Artículo</th>
                            <th class="py-3 px-6 text-sm font-semibold text-gray-600">Cantidad</th>
                            <th class="py-3 px-6 text-sm font-semibold text-gray-600 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="solicitudesTableBody" class="divide-y divide-gray-100">
                        <!-- Llenado por JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal Detalle -->
    <div id="detalleModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden items-center justify-center z-50 modal-enter-active">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-xl font-bold text-gray-800">Detalle de Solicitud</h3>
                <button onclick="closeModal('detalleModal')" class="text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1">
                <div id="detalleContent" class="space-y-4">
                    <!-- Contenido llenado por JS -->
                </div>
                
                <!-- Formulario de Aceptación (Oculto por defecto) -->
                <div id="acceptForm" class="mt-6 hidden bg-indigo-50 p-4 rounded-lg border border-indigo-100">
                    <h4 class="font-semibold text-indigo-800 mb-3 text-sm uppercase tracking-wider">Configurar Destino</h4>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Destino</label>
                            <select id="selectDestino" class="w-full border-gray-300 rounded-md shadow-sm p-2 text-sm border focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                                <option value="INVENTARIO">Inventario</option>
                                <option value="TALLER">Taller</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Estado de Envío</label>
                            <select id="selectEstadoEnvio" class="w-full border-gray-300 rounded-md shadow-sm p-2 text-sm border focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                                <option value="EN_CAMINO">En Camino</option>
                                <option value="LLEGO">Llegó</option>
                            </select>
                        </div>
                        <div class="pt-2">
                            <button id="btnConfirmAccept" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-md transition-colors text-sm">
                                Confirmar Aceptación
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="modalActions" class="p-6 border-t border-gray-100 bg-gray-50 flex gap-3 justify-end">
                <button id="btnReject" class="px-4 py-2 bg-red-100 text-red-700 hover:bg-red-200 rounded-lg font-medium text-sm transition-colors">
                    Rechazar
                </button>
                <button id="btnAccept" class="px-4 py-2 bg-green-600 text-white hover:bg-green-700 rounded-lg font-medium text-sm transition-colors shadow-sm">
                    Aceptar
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="solicitudes.js"></script>
</body>
</html>
